<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Managed Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-void: #08090c;
  --bg-base: #0e1117;
  --bg-raised: #151921;
  --bg-surface: #1c2130;
  --bg-surface-hover: #232a3b;
  --border-subtle: rgba(255,255,255,0.06);
  --border-medium: rgba(255,255,255,0.1);
  --text-primary: #d1d5e0;
  --text-secondary: #6b7394;
  --text-muted: #454d6b;
  --accent: #5b7ff5;
  --accent-glow: rgba(91,127,245,0.15);
  --accent-text: #8fa8ff;
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.12);
  --red: #f26e6e;
  --red-dim: rgba(242,110,110,0.12);
  --amber: #e5a63e;
  --amber-dim: rgba(229,166,62,0.12);
  --mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px;
  --radius-sm: 6px;
}

html, body { height: 100%; }

body {
  font-family: var(--sans);
  background: var(--bg-void);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 48px;
  background: var(--bg-base);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 14px; letter-spacing: -0.3px;
}
.logo-mark {
  width: 22px; height: 22px; border-radius: 6px;
  background: linear-gradient(135deg, var(--accent) 0%, #9b6dff 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; font-weight: 700;
}

.btn-new {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font: 500 12px var(--sans);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-new:hover { background: var(--bg-surface-hover); border-color: var(--accent); }
.btn-new svg { width: 14px; height: 14px; stroke: var(--text-secondary); }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 230px;
  background: var(--bg-base);
  border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}

.sidebar-label {
  padding: 16px 16px 8px;
  font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--text-muted);
}

.sidebar-list {
  flex: 1; overflow-y: auto; padding: 4px 8px 8px;
}

.sidebar-item {
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s;
  margin-bottom: 1px;
}
.sidebar-item:hover { background: var(--bg-raised); }
.sidebar-item.active { background: var(--bg-surface); }

.sidebar-item-title {
  font-size: 13px; font-weight: 500;
  color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sidebar-item.active .sidebar-item-title { color: #fff; }

.sidebar-item-meta {
  font-size: 11px; color: var(--text-muted); margin-top: 2px;
}

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── Messages ── */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 24px 24px 8px;
}

.chat-inner {
  max-width: 780px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.chat-empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 14px;
  min-height: 300px;
}

/* ── User Bubble ── */
.bubble-user {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius) var(--radius) 4px var(--radius);
  padding: 12px 16px;
  font-size: 14px; line-height: 1.65;
  max-width: 85%;
  align-self: flex-end;
}

/* ── Agent Message ── */
.block-agent {
  font-size: 14px; line-height: 1.75;
}

.agent-label {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600;
  color: var(--green);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 6px;
}
.agent-label::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
}

.agent-text {
  color: var(--text-primary);
  word-break: break-word;
}

/* ── Markdown content inside agent-text ── */
.agent-text p { margin: 0.4em 0; }
.agent-text p:first-child { margin-top: 0; }
.agent-text p:last-child { margin-bottom: 0; }

.agent-text h1, .agent-text h2, .agent-text h3, .agent-text h4 {
  margin: 0.8em 0 0.3em;
  color: #fff;
  line-height: 1.3;
}
.agent-text h1 { font-size: 1.3em; }
.agent-text h2 { font-size: 1.15em; }
.agent-text h3 { font-size: 1.05em; }
.agent-text h4 { font-size: 1em; }

.agent-text code {
  font-family: var(--mono);
  font-size: 0.88em;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: 4px;
  padding: 1px 5px;
}

.agent-text pre {
  margin: 0.6em 0;
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  overflow-x: auto;
}
.agent-text pre code {
  background: none;
  border: none;
  padding: 0;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-secondary);
}

.agent-text table {
  width: 100%;
  border-collapse: collapse;
  margin: 0.6em 0;
  font-size: 13px;
}
.agent-text th, .agent-text td {
  border: 1px solid var(--border-medium);
  padding: 6px 10px;
  text-align: left;
}
.agent-text th {
  background: var(--bg-surface);
  font-weight: 600;
  color: #fff;
}
.agent-text tr:nth-child(even) td { background: var(--bg-raised); }

.agent-text ul, .agent-text ol {
  margin: 0.4em 0;
  padding-left: 1.6em;
}
.agent-text li { margin: 0.15em 0; }
.agent-text li > ul, .agent-text li > ol { margin: 0.1em 0; }

.agent-text blockquote {
  border-left: 3px solid var(--accent);
  margin: 0.5em 0;
  padding: 4px 12px;
  color: var(--text-secondary);
}

.agent-text a {
  color: var(--accent-text);
  text-decoration: none;
}
.agent-text a:hover { text-decoration: underline; }

.agent-text hr {
  border: none;
  border-top: 1px solid var(--border-medium);
  margin: 0.8em 0;
}

.agent-text strong { color: #fff; }
.agent-text img { max-width: 100%; border-radius: var(--radius-sm); }

/* ── Tool Card ── */
.tool-card {
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}
.tool-card:hover { border-color: var(--border-medium); }

.tool-card-head {
  display: flex; align-items: center;
  padding: 0 14px;
  height: 38px;
  cursor: pointer; user-select: none;
  gap: 8px;
}

.tool-card-icon {
  width: 20px; height: 20px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}
.tool-card-icon.cmd  { background: var(--amber-dim); color: var(--amber); }
.tool-card-icon.file { background: var(--accent-glow); color: var(--accent-text); }
.tool-card-icon.web  { background: var(--green-dim); color: var(--green); }

.tool-card-name {
  font: 500 12px/1 var(--mono);
  color: var(--text-primary);
}

.tool-card-badge {
  font-size: 10px; font-weight: 600;
  padding: 2px 7px;
  border-radius: 9px;
  line-height: 1;
}
.tool-card-badge.running {
  background: var(--amber-dim);
  color: var(--amber);
  animation: pulse-badge 1.8s ease-in-out infinite;
}
.tool-card-badge.done { background: var(--green-dim); color: var(--green); }
.tool-card-badge.fail { background: var(--red-dim); color: var(--red); }

@keyframes pulse-badge {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.tool-card-chevron {
  margin-left: auto;
  width: 16px; height: 16px;
  color: var(--text-muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}
.tool-card-chevron.open { transform: rotate(90deg); }

.tool-card-body {
  display: none;
  border-top: 1px solid var(--border-subtle);
}
.tool-card-body.open { display: block; }

.tool-section {
  padding: 0;
}
.tool-section-head {
  padding: 6px 14px 2px;
  font: 600 9px/1 var(--sans);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
}

.tool-section-code {
  padding: 6px 14px 10px;
  font: 400 12px/1.6 var(--mono);
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 260px;
  overflow-y: auto;
}

.tool-section-code.output-text { color: var(--text-primary); }
.tool-section-code.output-error { color: var(--red); }

.tool-section + .tool-section { border-top: 1px solid var(--border-subtle); }

/* ── Download Button ── */
.download-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--accent-glow);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  color: var(--accent-text);
  font: 500 13px var(--sans);
  text-decoration: none;
  cursor: pointer;
  transition: all 0.15s;
}
.download-btn:hover {
  background: var(--accent);
  color: #fff;
}

/* ── Thinking ── */
.block-thinking {
  border-left: 2px solid var(--text-muted);
  padding: 6px 12px;
  font: italic 12px/1.6 var(--sans);
  color: var(--text-muted);
  white-space: pre-wrap;
  max-height: 160px; overflow-y: auto;
}

/* ── Processing indicator ── */
.agent-processing {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0;
  font: 400 13px var(--sans);
  color: var(--text-muted);
}
.agent-processing .dot-pulse {
  display: flex; gap: 4px;
}
.agent-processing .dot-pulse span {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--text-muted);
  animation: dot-bounce 1.4s ease-in-out infinite;
}
.agent-processing .dot-pulse span:nth-child(2) { animation-delay: 0.16s; }
.agent-processing .dot-pulse span:nth-child(3) { animation-delay: 0.32s; }
@keyframes dot-bounce {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ── Composer ── */
.composer {
  padding: 12px 24px 16px;
  background: var(--bg-base);
  border-top: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.composer-inner {
  max-width: 780px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.composer-input {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  color: var(--text-primary);
  font: 400 14px var(--sans);
  resize: none; outline: none;
  min-height: 44px; max-height: 180px;
  transition: border-color 0.15s;
}
.composer-input:focus { border-color: var(--accent); }
.composer-input::placeholder { color: var(--text-muted); }

.composer-send {
  height: 44px; width: 44px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent);
  border: none; border-radius: var(--radius);
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  flex-shrink: 0;
}
.composer-send:hover { opacity: 0.85; }
.composer-send:active { transform: scale(0.95); }
.composer-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.composer-send svg { width: 18px; height: 18px; stroke: #fff; fill: none; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── Animations ── */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fade-up 0.25s ease-out both; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-mark">M</div>
    <span>Managed Agent</span>
  </div>
  <button class="btn-new" id="new-session-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Session
  </button>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-label">Sessions</div>
    <div class="sidebar-list" id="session-list"></div>
  </div>

  <div class="main">
    <div class="chat" id="chat-scroll">
      <div class="chat-inner" id="messages">
        <div class="chat-empty">Create or select a session</div>
      </div>
    </div>
    <div class="composer">
      <div class="composer-inner">
        <textarea class="composer-input" id="message-input" placeholder="Send a message..." rows="1" disabled></textarea>
        <button class="composer-send" id="send-btn" disabled>
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
marked.setOptions({ breaks: true, gfm: true });

const API = '';
let currentSessionId = null;
let isStreaming = false;

const $sessions = document.getElementById('session-list');
const $messages = document.getElementById('messages');
const $chatScroll = document.getElementById('chat-scroll');
const $input = document.getElementById('message-input');
const $send = document.getElementById('send-btn');

$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 180) + 'px';
});
$input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
$send.addEventListener('click', sendMessage);
document.getElementById('new-session-btn').addEventListener('click', createSession);

// ── Helpers ──

function el(tag, cls, txt) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (txt !== undefined && txt !== null) e.textContent = txt;
  return e;
}

function scrollEnd() { $chatScroll.scrollTop = $chatScroll.scrollHeight; }

const TOOL_META = {
  execute_command: { icon: '\u26A1', cls: 'cmd',  label: 'exec' },
  write_file:      { icon: '\uD83D\uDCDD', cls: 'file', label: 'write' },
  read_file:       { icon: '\uD83D\uDCC4', cls: 'file', label: 'read' },
  browse_web:      { icon: '\uD83C\uDF10', cls: 'web',  label: 'browse' },
  take_screenshot: { icon: '\uD83D\uDCF7', cls: 'web',  label: 'screenshot' },
  download_file:   { icon: '\u2B07',        cls: 'file', label: 'download' },
};

// ── Sessions ──

async function loadSessions() {
  const r = await fetch(API + '/api/sessions');
  renderSessions(await r.json() || []);
}

function renderSessions(list) {
  $sessions.textContent = '';
  list.forEach(s => {
    const d = el('div', 'sidebar-item' + (s.id === currentSessionId ? ' active' : ''));
    const first = (s.events || []).find(e => e.type === 'user_message');
    const title = el('div', 'sidebar-item-title', first ? String(first.content).slice(0, 40) : 'New session');
    const meta = el('div', 'sidebar-item-meta',
      new Date(s.created_at).toLocaleString('zh-CN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }));
    d.appendChild(title);
    d.appendChild(meta);
    d.onclick = () => selectSession(s.id);
    $sessions.appendChild(d);
  });
}

async function createSession() {
  const r = await fetch(API + '/api/sessions', { method: 'POST' });
  const s = await r.json();
  currentSessionId = s.id;
  await loadSessions();
  await loadSession(s.id);
}

async function selectSession(id) {
  currentSessionId = id;
  await loadSessions();
  await loadSession(id);
}

async function loadSession(id) {
  const r = await fetch(API + '/api/sessions/' + id);
  const s = await r.json();
  replayEvents(s.events || []);
  $input.disabled = false;
  $send.disabled = false;
  $input.focus();
}

// ── Replay stored events ──

function replayEvents(events) {
  $messages.textContent = '';
  let curAgent = null;

  events.forEach(evt => {
    switch (evt.type) {
      case 'user_message':
        curAgent = null;
        addUserBubble(String(evt.content));
        break;
      case 'assistant_message':
        if (!curAgent) curAgent = addAgentBlock();
        agentAppendText(curAgent, String(evt.content));
        break;
      case 'tool_use': {
        curAgent = null;
        const c = evt.content;
        addToolCard(c.name, c.input, null, c.id);
        break;
      }
      case 'tool_result': {
        const c = evt.content;
        const card = findToolCard(c.tool_use_id);
        if (card) finishToolCard(card, c.output, c.is_error);
        break;
      }
    }
  });
  scrollEnd();
}

// ── DOM Builders ──

function addUserBubble(text) {
  const d = el('div', 'bubble-user animate-in', text);
  $messages.appendChild(d);
  return d;
}

function addAgentBlock() {
  const d = el('div', 'block-agent animate-in');
  d.appendChild(el('div', 'agent-label', 'Agent'));
  const textEl = el('div', 'agent-text');
  textEl._mdBuf = '';
  d.appendChild(textEl);
  $messages.appendChild(d);
  return d;
}

function agentAppendText(block, text) {
  const textEl = block.querySelector('.agent-text');
  textEl._mdBuf = (textEl._mdBuf || '') + text;
  const dirty = marked.parse(textEl._mdBuf);
  const clean = DOMPurify.sanitize(dirty);
  textEl.innerHTML = clean;
}

function addToolCard(name, input, output, toolUseId) {
  const meta = TOOL_META[name] || { icon: '\uD83D\uDD27', cls: 'cmd', label: name };
  const card = el('div', 'tool-card animate-in');
  if (toolUseId) card.dataset.toolId = toolUseId;

  // Head
  const head = el('div', 'tool-card-head');
  const iconEl = el('span', 'tool-card-icon ' + meta.cls, meta.icon);
  const nameEl = el('span', 'tool-card-name', name);
  const badge = el('span', 'tool-card-badge running', 'running');
  const chevron = el('span', 'tool-card-chevron open');
  chevron.innerHTML = '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 4 10 8 6 12"/></svg>';

  head.append(iconEl, nameEl, badge, chevron);

  // Body
  const body = el('div', 'tool-card-body open');

  // Input section
  const secIn = el('div', 'tool-section');
  secIn.appendChild(el('div', 'tool-section-head', 'Input'));
  const codeIn = el('div', 'tool-section-code');
  if (input) {
    codeIn.textContent = formatToolInput(name, input);
  }
  secIn.appendChild(codeIn);

  // Output section
  const secOut = el('div', 'tool-section');
  secOut.appendChild(el('div', 'tool-section-head', 'Output'));
  const codeOut = el('div', 'tool-section-code output-text');
  if (output !== null && output !== undefined) {
    codeOut.textContent = output;
    badge.className = 'tool-card-badge done';
    badge.textContent = 'done';
  }
  secOut.appendChild(codeOut);

  body.append(secIn, secOut);
  card.append(head, body);

  // Toggle
  head.onclick = () => {
    chevron.classList.toggle('open');
    body.classList.toggle('open');
  };

  $messages.appendChild(card);
  return card;
}

function finishToolCard(card, output, isError) {
  const codeOut = card.querySelectorAll('.tool-section-code')[1];
  if (codeOut) {
    // Check if this is a download_file result with JSON payload
    const dlInfo = tryParseDownload(output);
    if (dlInfo) {
      codeOut.textContent = '';
      const link = document.createElement('a');
      link.href = '/api/files/download?path=' + encodeURIComponent(dlInfo.path);
      link.className = 'download-btn';
      link.download = dlInfo.path.split('/').pop();
      link.textContent = '\u2B07 Download: ' + dlInfo.path.split('/').pop();
      codeOut.appendChild(link);
      codeOut.className = 'tool-section-code output-text';
    } else {
      codeOut.textContent = output;
      codeOut.className = 'tool-section-code ' + (isError ? 'output-error' : 'output-text');
    }
  }
  const badge = card.querySelector('.tool-card-badge');
  if (badge) {
    badge.className = 'tool-card-badge ' + (isError ? 'fail' : 'done');
    badge.textContent = isError ? 'error' : 'done';
  }
  // Keep download cards expanded, collapse others
  const dlInfo = tryParseDownload(output);
  if (!dlInfo) {
    const chev = card.querySelector('.tool-card-chevron');
    const body = card.querySelector('.tool-card-body');
    if (chev) chev.classList.remove('open');
    if (body) body.classList.remove('open');
  }
}

function tryParseDownload(output) {
  if (!output) return null;
  try {
    const obj = JSON.parse(output);
    if (obj.type === 'download' && obj.path) return obj;
  } catch(e) {}
  return null;
}

function findToolCard(toolUseId) {
  if (toolUseId) {
    const found = $messages.querySelector('.tool-card[data-tool-id="' + toolUseId + '"]');
    if (found) return found;
  }
  // Fallback: last tool card still in "running" state
  const cards = $messages.querySelectorAll('.tool-card');
  for (let i = cards.length - 1; i >= 0; i--) {
    const badge = cards[i].querySelector('.tool-card-badge');
    if (badge && badge.textContent === 'running') return cards[i];
  }
  return cards.length ? cards[cards.length - 1] : null;
}

function addThinkingBlock() {
  const d = el('div', 'block-thinking animate-in');
  $messages.appendChild(d);
  return d;
}

function showProcessing() {
  removeProcessing();
  const d = el('div', 'agent-processing');
  d.id = 'agent-spinner';
  const dots = el('div', 'dot-pulse');
  dots.appendChild(el('span'));
  dots.appendChild(el('span'));
  dots.appendChild(el('span'));
  d.appendChild(dots);
  d.appendChild(document.createTextNode('Agent is working...'));
  $messages.appendChild(d);
  scrollEnd();
}

function removeProcessing() {
  const s = document.getElementById('agent-spinner');
  if (s) s.remove();
}

function formatToolInput(name, input) {
  if (!input) return '';
  if (name === 'execute_command' && input.command) return '$ ' + input.command;
  if (name === 'write_file' && input.path) return input.path + ' (' + (input.content || '').length + ' chars)';
  if (name === 'read_file' && input.path) return input.path;
  if (name === 'browse_web' && input.url) return input.url;
  if (name === 'take_screenshot' && input.url) return input.url;
  if (name === 'download_file' && input.path) return input.path;
  return JSON.stringify(input, null, 2);
}

// ── SSE Streaming ──

async function sendMessage() {
  const msg = $input.value.trim();
  if (!msg || !currentSessionId || isStreaming) return;

  isStreaming = true;
  $input.value = '';
  $input.style.height = 'auto';
  $send.disabled = true;

  addUserBubble(msg);
  showProcessing();
  scrollEnd();

  let curAgent = null, curThink = null;

  try {
    const res = await fetch(API + '/api/sessions/' + currentSessionId + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let evtType = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const ln of lines) {
        if (ln.startsWith('event: ')) { evtType = ln.slice(7); continue; }
        if (!ln.startsWith('data: ')) continue;
        try { handle(evtType, JSON.parse(ln.slice(6))); } catch(e) {}
      }
    }
  } catch (err) {
    const d = el('div', 'block-agent animate-in');
    d.style.color = 'var(--red)';
    d.textContent = 'Connection error: ' + err.message;
    $messages.appendChild(d);
  }

  function handle(type, data) {
    switch (type) {
      case 'text':
        removeProcessing();
        curThink = null;
        if (!curAgent) curAgent = addAgentBlock();
        agentAppendText(curAgent, data.content);
        break;

      case 'thinking_start':
        removeProcessing();
        curThink = addThinkingBlock();
        break;

      case 'thinking':
        if (curThink) curThink.textContent += data.content;
        break;

      case 'tool_use_start':
        removeProcessing();
        curAgent = null;
        addToolCard(data.name, null, null, data.id);
        break;

      case 'tool_use': {
        const card = findToolCard(data.id);
        if (card) {
          const ci = card.querySelector('.tool-section-code');
          if (ci) ci.textContent = formatToolInput(data.name, data.input);
        }
        curAgent = null;
        break;
      }

      case 'tool_result': {
        const card = findToolCard(data.tool_use_id);
        if (card) {
          // Update input if it was missing (fallback from tool_result)
          if (data.input && data.name) {
            const ci = card.querySelector('.tool-section-code');
            if (ci && !ci.textContent.trim()) {
              ci.textContent = formatToolInput(data.name, data.input);
            }
          }
          finishToolCard(card, data.output, data.is_error);
        }
        // Show spinner — agent is processing next step
        showProcessing();
        break;
      }

      case 'done':
        removeProcessing();
        break;

      case 'error': {
        removeProcessing();
        const d = el('div', 'block-agent animate-in');
        d.style.color = 'var(--red)';
        d.textContent = 'Error: ' + (data.error || 'Unknown');
        $messages.appendChild(d);
        break;
      }
    }
    scrollEnd();
  }

  removeProcessing();
  isStreaming = false;
  $send.disabled = false;
  $input.focus();
  loadSessions();
}

loadSessions();
</script>
