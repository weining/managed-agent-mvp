Global:
  version: "2.0"
  group_email: xxx@baidu.com
Default:
  profile:
    - amd64_build
Profiles:
  - profile:
    name: amd64_build
    mode: AGENT
    environment:
      image: DECK_STD_CENTOS7
      resourceType: MEDIUM
      tools:
        - go: 1.23.latest
        - gcc: 12
    build:
      command: make -f Makefile
    artifacts:
      release: true
  - profile:
    name: arm64_build
    mode: AGENT
    environment:
      image: DECK_STD_CENTOS7
      resourceType: MEDIUM
      tools:
        - go: 1.23.latest
        - gcc: 12
    build:
      command: export GOOS=linux; export GOARCH=arm64; make -f Makefile
    artifacts:
      platform:
        arch: AARCH64
        os: LINUX
      release: true
  - profile:
    name: gcover
    mode: AGENT
    environment:
      image: DECK_STD_CENTOS7
      resourceType: MEDIUM
      tools:
        - go: 1.23.latest
        - gcc: 12
    build:
      gcover:
        enable: true # <------ 开启打桩编译
        flags: -2 # <------ 配置 gcover01 编译参数，-1 开启覆盖率插桩编译，-2 开启覆盖率插件编译(支持debug)，默认值为 -1
      command: make -f Makefile
    artifacts:
      release: true