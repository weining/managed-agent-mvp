# Managed Agent Configuration
#
# Copy this file to config.yaml before running:
#   cp config.example.yaml config.yaml
#
# Priority: environment variables > this file > defaults

# ── LLM ──────────────────────────────────────────────
# Options: claude / gemini / openai
llm_provider: claude
llm_base_url: https://your-llm-provider.example.com
llm_api_key: sk-your-api-key-here
llm_model: claude-sonnet-4-6
llm_max_tokens: 8192
llm_debug: false

# Optional JSON string with extra HTTP headers for the LLM API.
# Example:
# llm_custom_header: {"x-trace-id": "demo-request-id"}

# ── Sandbox ──────────────────────────────────────────
sandbox_base_url: https://your-sandbox.example.com
sandbox_id: your-sandbox-id

# ── Server ───────────────────────────────────────────
listen_addr: :8080

# ── Storage ──────────────────────────────────────────
data_dir: data/sessions
skills_dir: skills
